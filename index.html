<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Recetario</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&family=DM+Serif+Display&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #FAF8F5;
    --card: #FFFFFF;
    --text: #1A1A1A;
    --muted: #6B6B6B;
    --accent: #E8503A;
    --accent-soft: #FFF0ED;
    --border: #E8E4DF;
    --tag-q: #F59E0B;
    --tag-cw: #6366F1;
    --tag-cb: #E8503A;
    --tag-mo: #2E7D32;
    --radius: 16px;
    --sidebar-w: 300px;
  }

  body {
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(250, 248, 245, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    color: var(--text);
    white-space: nowrap;
  }

  .logo span { color: var(--accent); }

  .search-box {
    flex: 1;
    max-width: 400px;
    min-width: 200px;
    position: relative;
  }

  .search-box input {
    width: 100%;
    padding: 10px 16px 10px 42px;
    border: 1.5px solid var(--border);
    border-radius: 100px;
    font-size: 0.95rem;
    font-family: inherit;
    background: var(--card);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus { border-color: var(--accent); }

  .search-box svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    color: var(--muted);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .stats {
    font-size: 0.85rem;
    color: var(--muted);
    white-space: nowrap;
  }

  .stats b { color: var(--text); font-weight: 700; }

  .btn-ingredients-toggle {
    display: none;
    padding: 8px 14px;
    border: 1.5px solid var(--accent);
    border-radius: 100px;
    background: var(--card);
    font-size: 0.82rem;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    color: var(--accent);
    white-space: nowrap;
    transition: all 0.2s;
  }

  .btn-ingredients-toggle:hover,
  .btn-ingredients-toggle.active {
    background: var(--accent);
    color: white;
  }

  /* FILTERS */
  .filters {
    max-width: 1400px;
    margin: 0 auto;
    padding: 16px 24px 0;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 6px 14px;
    border: 1.5px solid var(--border);
    border-radius: 100px;
    background: var(--card);
    font-size: 0.82rem;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--muted);
    white-space: nowrap;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--text); color: white; border-color: var(--text); }

  .filter-divider {
    width: 1px;
    background: var(--border);
    margin: 0 4px;
    align-self: stretch;
  }

  .tag-btn { font-size: 0.78rem; padding: 5px 10px; }
  .tag-btn[data-tag="Qbano"] { border-color: var(--tag-q); color: var(--tag-q); }
  .tag-btn[data-tag="Qbano"].active { background: var(--tag-q); color: white; }
  .tag-btn[data-tag="Crepes & Waffles"] { border-color: var(--tag-cw); color: var(--tag-cw); }
  .tag-btn[data-tag="Crepes & Waffles"].active { background: var(--tag-cw); color: white; }
  .tag-btn[data-tag="Chef Burger"] { border-color: var(--tag-cb); color: var(--tag-cb); }
  .tag-btn[data-tag="Chef Burger"].active { background: var(--tag-cb); color: white; }
  .tag-btn[data-tag="Montolivo"] { border-color: var(--tag-mo); color: var(--tag-mo); }
  .tag-btn[data-tag="Montolivo"].active { background: var(--tag-mo); color: white; }

  /* SELECTED INGREDIENTS BAR */
  .selected-ingredients-bar {
    max-width: 1400px;
    margin: 0 auto;
    padding: 10px 24px 0;
    display: none;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }

  .selected-ingredients-bar.visible { display: flex; }

  .selected-ingredients-bar .label {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-right: 4px;
  }

  .selected-ing-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 100px;
    background: var(--accent);
    color: white;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .selected-ing-pill:hover { background: #c93d2a; }
  .selected-ing-pill svg { width: 12px; height: 12px; }

  .clear-all-ing {
    padding: 4px 10px;
    border: 1.5px solid var(--border);
    border-radius: 100px;
    background: var(--card);
    font-size: 0.75rem;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    color: var(--muted);
    margin-left: 4px;
  }

  .clear-all-ing:hover { border-color: var(--accent); color: var(--accent); }

  /* LAYOUT */
  .layout {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
    display: flex;
    gap: 24px;
    align-items: flex-start;
  }

  /* SIDEBAR */
  .sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    position: sticky;
    top: 100px;
    max-height: calc(100vh - 120px);
    overflow-y: auto;
    background: var(--card);
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    scrollbar-width: thin;
  }

  .sidebar::-webkit-scrollbar { width: 6px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .sidebar-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .sidebar-title svg { width: 18px; height: 18px; color: var(--accent); }

  .sidebar-search {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-search input {
    width: 100%;
    padding: 7px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 0.82rem;
    font-family: inherit;
    outline: none;
    background: var(--bg);
  }

  .sidebar-search input:focus { border-color: var(--accent); }

  /* ACCORDION */
  .accordion-section { border-bottom: 1px solid var(--border); }
  .accordion-section:last-child { border-bottom: none; }

  .accordion-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }

  .accordion-header:hover { background: var(--bg); }

  .accordion-header-left {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.88rem;
    font-weight: 600;
  }

  .accordion-header-left .icon { font-size: 1rem; }

  .accordion-header .count-badge {
    font-size: 0.72rem;
    background: var(--bg);
    color: var(--muted);
    padding: 2px 7px;
    border-radius: 100px;
    font-weight: 600;
  }

  .accordion-header .chevron {
    width: 16px;
    height: 16px;
    color: var(--muted);
    transition: transform 0.25s;
  }

  .accordion-section.open .chevron { transform: rotate(180deg); }

  .accordion-body {
    display: none;
    padding: 0 12px 12px;
  }

  .accordion-section.open .accordion-body { display: block; }

  .ing-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.82rem;
    color: var(--text);
  }

  .ing-item:hover { background: var(--bg); }

  .ing-item.selected {
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 600;
  }

  .ing-item .ing-count {
    font-size: 0.72rem;
    color: var(--muted);
    background: var(--bg);
    padding: 1px 6px;
    border-radius: 100px;
    min-width: 22px;
    text-align: center;
  }

  .ing-item.selected .ing-count {
    background: var(--accent);
    color: white;
  }

  /* MAIN CONTENT */
  .content { flex: 1; min-width: 0; }

  .category { margin-bottom: 40px; }

  .category-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--text);
  }

  .category-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
  }

  .category-count {
    font-size: 0.85rem;
    color: var(--muted);
    font-weight: 500;
  }

  .recipes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }

  /* CARD */
  .recipe-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    border: 1.5px solid var(--border);
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .recipe-card:hover {
    border-color: var(--accent);
    box-shadow: 0 4px 24px rgba(232, 80, 58, 0.08);
    transform: translateY(-2px);
  }

  .recipe-card .tag {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 3px 8px;
    border-radius: 6px;
    margin-bottom: 8px;
  }

  .tag-q { background: #FEF3C7; color: #92400E; }
  .tag-cw { background: #E0E7FF; color: #3730A3; }
  .tag-cb { background: #FEE2E2; color: #991B1B; }
  .tag-mo { background: #E8F5E9; color: #1B5E20; }

  .recipe-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1.15rem;
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .ingredients-preview {
    font-size: 0.85rem;
    color: var(--muted);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .ingredient-count {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .ingredient-count svg { width: 14px; height: 14px; }

  /* EXPANDED CARD */
  .recipe-card.expanded {
    border-color: var(--accent);
    box-shadow: 0 8px 32px rgba(232, 80, 58, 0.12);
  }

  .recipe-card.expanded .ingredients-preview { display: none; }
  .recipe-card.expanded .ingredient-count { display: none; }

  .ingredients-full {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .recipe-card.expanded .ingredients-full { display: block; }

  .ingredients-full ul {
    list-style: none;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .ingredients-full li {
    font-size: 0.82rem;
    padding: 4px 10px;
    background: var(--bg);
    border-radius: 8px;
    color: var(--text);
    border: 1px solid var(--border);
  }

  .ingredients-full li.highlighted {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }

  /* PREPARATION STEPS */
  .preparation {
    display: none;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .recipe-card.expanded .preparation { display: block; }

  .preparation-title {
    font-family: 'DM Serif Display', serif;
    font-size: 0.95rem;
    margin-bottom: 10px;
    color: var(--text);
  }

  .preparation ol {
    list-style: none;
    counter-reset: step;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .preparation ol li {
    counter-increment: step;
    font-size: 0.82rem;
    line-height: 1.5;
    color: var(--text);
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .preparation ol li::before {
    content: counter(step);
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    font-size: 0.72rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
  }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 80px 24px;
    color: var(--muted);
  }

  .empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.4; }
  .empty h3 { font-family: 'DM Serif Display', serif; font-size: 1.3rem; color: var(--text); }
  .empty p { margin-top: 4px; font-size: 0.95rem; }

  /* MOBILE OVERLAY */
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .sidebar-overlay.visible { opacity: 1; }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .btn-ingredients-toggle { display: inline-flex; }

    .sidebar {
      position: fixed;
      top: 0;
      left: -320px;
      width: 300px;
      height: 100vh;
      max-height: 100vh;
      border-radius: 0;
      border: none;
      border-right: 1px solid var(--border);
      z-index: 201;
      transition: left 0.3s ease;
    }

    .sidebar.mobile-open { left: 0; }
    .sidebar-overlay.visible { display: block; }

    .layout { padding: 16px; }
    .recipes-grid { grid-template-columns: 1fr; }
  }

  @media (max-width: 640px) {
    .header-inner { padding: 12px 16px; }
    .logo { font-size: 1.3rem; }
    .search-box { max-width: 100%; order: 3; flex-basis: 100%; }
    .stats { font-size: 0.8rem; }
    .filters { padding: 12px 16px 0; }
    .selected-ingredients-bar { padding: 10px 16px 0; }
    .category-name { font-size: 1.25rem; }
  }

  /* SCROLL TO TOP */
  .scroll-top {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--text);
    color: white;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 99;
  }

  .scroll-top.visible { opacity: 1; }
  .scroll-top svg { width: 20px; height: 20px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">Mi <span>Recetario</span></div>
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Buscar receta o ingrediente..." autocomplete="off">
    </div>
    <div class="header-right">
      <button class="btn-ingredients-toggle" id="btnIngToggle" onclick="toggleMobileSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;margin-right:4px"><path d="M3 6h18M3 12h12M3 18h6"/></svg>
        Ingredientes
      </button>
      <div class="stats" id="stats"></div>
    </div>
  </div>
</header>

<div class="filters" id="filters"></div>
<div class="selected-ingredients-bar" id="selectedBar"></div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      Explorar por ingrediente
    </div>
    <div class="sidebar-search">
      <input type="text" id="ingSidebarSearch" placeholder="Filtrar ingredientes..." oninput="filterSidebarIngredients(this.value)">
    </div>
    <div id="accordionContainer"></div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMobileSidebar()"></div>

  <div class="content" id="main"></div>
</div>

<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 15l-6-6-6 6"/></svg>
</button>

<script>
// ═══════════════════════════════════════════════════════════════
// DATA — normalizada y coherente

const DATA = {"Sopas": [{"nombre": "Sopa de Espinaca", "restaurante": "Crepes & Waffles", "ingredientes": ["Espinaca", "Cebolla", "Ajo", "Caldo de pollo o vegetales", "Crema de leche", "Mantequilla", "Sal", "Pimienta", "Nuez moscada"], "preparacion": ["Derretir 2 cdas de mantequilla en una olla, sofreír 1 cebolla picada y 2 dientes de ajo por 3 minutos hasta que estén transparentes.", "Agregar 500 g de espinaca fresca lavada y cocinar por 2 minutos hasta que se marchite. Añadir 4 tazas de caldo de pollo o vegetales.", "Cocinar a fuego medio por 10 minutos. Licuar hasta obtener una crema suave.", "Volver al fuego, agregar 1/2 taza de crema de leche, sal, pimienta y una pizca de nuez moscada. Calentar sin hervir por 3 minutos.", "Servir caliente con un toque de crema de leche por encima."]}, {"nombre": "Sopa Mexicana de Pollo", "restaurante": "Crepes & Waffles", "ingredientes": ["Pollo", "Chile chipotle", "Crema agria", "Queso", "Aguacate", "Pico de gallo", "Tortilla mexicana", "Cebolla", "Ajo", "Aceite", "Caldo de pollo", "Sal", "Pimienta", "Comino"], "preparacion": ["En una olla con aceite, sofreír cebolla picada y ajo por 3 minutos. Agregar 1-2 chiles chipotle picados y cocinar 1 minuto más.", "Añadir el pollo desmechado y 5 tazas de caldo de pollo. Sazonar con sal, pimienta y comino. Hervir y luego cocinar a fuego bajo por 15 minutos.", "Cortar las tortillas en tiras finas y freírlas en aceite caliente hasta que estén crujientes. Reservar sobre papel absorbente.", "Servir la sopa caliente, coronar con crema agria, queso rallado, aguacate en cubos, pico de gallo y las tiras de tortilla crujientes."]}, {"nombre": "Sopa de Lentejas", "restaurante": "Crepes & Waffles", "ingredientes": ["Lentejas", "Champiñones", "Portobello", "Especias", "Cebolla", "Ajo", "Zanahoria", "Aceite de oliva", "Caldo de vegetales", "Sal", "Pimienta", "Comino"], "preparacion": ["Remojar 1 taza de lentejas por 1 hora (o usar sin remojo añadiendo más tiempo de cocción). Escurrir y reservar.", " ar lechuga, tomate, el portobello con mozzarella, calabacín grillado, cebolla caramelizada y queso azul desmenuzado. Servir inmediatamente."]}], "Wraps": [{"nombre": "Wrap Al Pastor", "restaurante": "Qbano", "ingredientes": ["Tortilla de harina", "Costilla de cerdo", "Lechuga batavia", "Hogao", "Pasta de tomate", "Piña asada", "Pico de gallo", "Cebolla blanca", "Cilantro", "Sal", "Pimienta", "Aceite"], "preparacion": ["Cocinar la costilla de cerdo sazonada con sal, pimienta y pasta de tomate en horno a 160°C por 2 horas. Desmechar. Preparar el hogao sofriendo cebolla blanca y tomate en aceite por 8-10 minutos. Mezclar la carne con el hogao.", "Asar rodajas de piña en plancha por 2 minutos por lado. Preparar el pico de gallo con tomate, cebolla y cilantro picados, limón y sal.", "Calentar la tortilla de harina en un sartén seco o directamente sobre la llama por 20-30 segundos por lado hasta que esté flexible.", "Colocar en el centro de la tortilla: lechuga batavia, la costilla al pastor, piña asada y pico de gallo. Decorar con cilantro.", "Doblar los extremos de la tortilla hacia adentro y enrollar firmemente. Cortar por la mitad en diagonal y servir."]}, {"nombre": "Wrap Costilla", "restaurante": "Qbano", "ingredientes": ["Tortilla de harina", "Costilla de cerdo", "Salsa BBQ", "Maíz tierno", "Queso mozzarella", "Lechuga", "Salsa Qbano", "Sal", "Pimienta", "Aceite"], "preparacion": ["Cocinar la costilla de cerdo sazonada con sal y pimienta en horno a 160°C por 2-2.5 horas, bañándola con salsa BBQ los últimos 30 minutos. Desmechar la carne. Calentar el maíz tierno en sartén con aceite por 2-3 minutos.", "Preparar la Salsa Qbano mezclando mayonesa con mostaza, salsa de tomate y ajo en polvo.", "Calentar la tortilla de harina en sartén seco por 20-30 segundos por lado hasta que esté flexible.", "Colocar en el centro: Salsa Qbano, lechuga, costilla desmechada con BBQ, maíz tierno y queso mozzarella rallado.", "Doblar los extremos hacia adentro y enrollar firmemente. Cort : mezclar 1 taza de harina, 2 huevos, 1 taza de leche, 1 cda de mantequilla derretida y una pizca de sal. Dejar reposar 30 min.", "Cocinar las crepes en sartén antiadherente con mantequilla. Reservar.", "Calentar el cerdo desmechado estilo cochinita pibil (marinado con achiote, naranja agria y especias) en una sartén por 5 minutos a fuego medio, desmechando bien.", "Rellenar cada crepe con la cochinita pibil, doblar y servir con aguacate en láminas, pico de gallo, cebolla encurtida y crema agria."]}], "Crepes de Mar": [{"nombre": "Crepe de Cangrejo Marco Polo", "restaurante": "Crepes & Waffles", "ingredientes": ["Palmitos de cangrejo", "Salsa de la casa", "Harina", "Huevos", "Leche", "Mantequilla", "Sal", "Pimienta", "Aceite", "Cebolla", "Ajo", "Crema de leche"], "preparacion": ["Preparar la masa de crepes: mezclar 1 taza de harina, 2 huevos, 1 taza de leche, 1 cda de mantequilla derretida y una pizca de sal. Dejar reposar 30 min.", "Cocinar las crepes en sartén antiadherente con mantequilla. Reservar.", "Saltear los palmitos de cangrejo suavemente en mantequilla con ajo por 2-3 minutos (no sobrecocinar para mantener la textura tierna). Agregar la salsa de la casa (crema, cebolla, especias) y cocinar 2 minutos más.", "Rellenar cada crepe con el cangrejo en salsa, doblar y servir de inmediato."]}, {"nombre": "Crepe de Cangrejo al Curry", "restaurante": "Crepes & Waffles", "ingredientes": ["Palmitos de cangrejo", "Salsa curry", "Harina", "Huevos", "Leche", "Mantequilla", "Sal", "Pimienta", "Aceite", "Cebolla", "Crema de leche", "Curry en polvo"], "preparacion": ["Preparar la masa de crepes: mezclar 1 taza de harina, 2 huevos, 1 taza de leche, 1 cda de mantequilla derretida y una pizca de sal. Dejar reposar 30 min.", "Cocinar las crepes en sartén antiadherente con mantequilla. Reservar.", "Sofreír cebolla por 3 minutos. Agregar los palmitos de cangrejo con cuidado y cocinar apenas 2-3 minutos (los mariscos se endurecen si se cocinan de más). Añadir curry en polvo y cre  de leche, 1 cda de mantequilla derretida y una pizca de sal. Dejar reposar 30 min.", "Cocinar las crepes en sartén antiadherente con mantequilla. Reservar.", "Sofreír cebolla por 3 minutos, añadir curry en polvo y crema de leche. Cocinar los camarones pelados por 2-3 minutos por lado hasta que estén rosados (no sobrecocinar o quedan gomosos). Incorporar a la salsa curry.", "Rellenar cada crepe con los camarones al curry, doblar y servir con salsa extra."]}, {"nombre": "Crepe de Camarones Marco Polo", "restaurante": "Crepes & Waffles", "ingredientes": ["Camarones", "Salsa de la casa", "Harina", "Huevos", "Leche", "Mantequilla", "Sal", "Pimienta", "Aceite", "Cebolla", "Ajo", "Crema de leche"], "preparacion": ["Preparar la masa de crepes: mezclar 1 taza de harina, 2 huevos, 1 taza de leche, 1 cda de mantequilla derretida y una pizca de sal. Dejar reposar 30 min.", "Cocinar las crepes en sartén antiadherente con mantequilla. Reservar.", "Saltear los camarones pelados con ajo en mantequilla por 2-3 minutos hasta que estén rosados y curvados (retirar inmediatamente para evitar sobrecocción). Preparar la salsa de la casa con crema, cebolla y especias.", "Rellenar las crepes con los camarones y bañar con la salsa Marco Polo. Doblar y servir."]}, {"nombre": "Crepe de Camarones al Ajillo", "restaurante": "Crepes & Waffles", "ingredientes": ["Camarones", "Salsa al ajillo", "Harina", "Huevos", "Leche", "Mantequilla", "Sal", "Pimienta", "Aceite de oliva", "Ajo", "Ají rojo seco", "Perejil", "Vino blanco"], "preparacion": ["Preparar la masa de crepes: mezclar 1 taza de harina, 2 huevos, 1 taza de leche, 1 cda de mantequilla derretida y una pizca de sal. Dejar reposar 30 min.", "Cocinar las crepes en sartén antiadherente con mantequilla. Reservar.", "Calentar aceite de oliva abundante con 4-5 dientes de ajo laminados y ají rojo seco. Cuando el ajo empiece a dorar, agregar los camarones pelados y cocinar 2-3 minutos hasta que estén rosados. Añadir un chorrito de vino blanco y perejil picado.", "Rellenar cada crepe con los camarones al ajillo y su aceite aromático. Doblar y servir inmediatamente."]}, {"nombre": "Crepe Salmon Roll", "restaurante": "Crepes & Waffles", "ingredientes": ["Salmón ahumado", "Rúgula", "Queso crema", "Mostaza", "Cebolla", "Aguacate", "Vegetales frescos", "Ensalada verde", "Harina", "Huevos", "Leche", "Mantequilla", "Sal", "Pimienta"], "preparacion": ["Preparar la masa de crepes: mezclar 1 taza de harina, 2 huevos, 1 taza de leche, 1 cda de mantequilla derretida y una pizca de sal. Dejar reposar 30 min.", "Cocinar las crepes en sartén antiadherente con mantequilla. Reservar y dejar enfriar (esta crepe se sirve fría o tibia).", "Untar cada crepe con queso crema y un toque de mostaza. Colocar láminas de salmón ahumado (no necesita cocción), cebolla en aros finos, aguacate en láminas y vegetales frescos.", "Enrollar la crepe como un roll, cortar a la mitad y servir con rúgula y ensalada verde al lado."]}, {"nombre": "Crepe de Camarones Rosarito", "restaurante": "Crepes & Waffles", "ingredientes": ["Camarones", "Chipotle", "Aguacate", "Frijoles rojos", "Harina", "Huevos", "Leche", "Mantequilla", "Sal", "Pimienta", "Aceite", "Cebolla", "Ajo"], "preparacion": ["Preparar la masa de crepes: mezclar 1 taza de harina, 2 huevos, 1 taza de leche, 1 cda de mantequilla derretida y una pizca de sal. Dejar reposar 30 min.", "Cocinar las crepes en sartén antiadherente con mantequilla. Reservar.", "Saltear los camarones con cebolla, ajo y salsa chipotle por 2-3 minutos hasta que estén rosados (no sobrecocinar). Calentar los frijoles rojos por separado, machacándolos ligeramente.", "Untar frijoles sobre la crepe, agregar los camarones al chipotle y aguacate en láminas. Doblar y servir caliente."]}, {"nombre": "Crepe Mar Encocado", "restaurante": "Crepes & Waffles", "ingredientes": ["Pulpo", "Camarones", "Calamares", "Langostinos", "Quinua negra", "Salsa de coco", "Coco crujiente", "Harina", "Huevos", "Leche", "Mantequilla", "Sal", "Pimien ar: colocar rúgula como base, añadir frijoles, tofu dorado y guacamole.", "Rociar con tahini, coronar con lentejas tostadas y servir."]}, {"nombre": "Ensalada Mikonos", "restaurante": "Crepes & Waffles", "ingredientes": ["Salmón ahumado", "Lechuga", "Rúgula", "Queso feta", "Aceitunas negras", "Champiñones", "Cebolla roja", "Albahaca", "Tomate cherry", "Pepino", "Vinagreta de hierbas", "Aceite de oliva", "Sal", "Pimienta"], "preparacion": ["Cortar salmón ahumado en láminas. Cortar queso feta en cubos, pepino en rodajas y tomate cherry por la mitad.", "Laminar champiñones frescos, cortar cebolla roja en aros finos.", "Preparar vinagreta de hierbas: mezclar aceite de oliva, vinagre, hierbas frescas, sal y pimienta.", "Lavar lechuga y rúgula. Ensamblar: mezclar lechugas como base, añadir salmón, feta, aceitunas, champiñones, cebolla, tomate cherry y pepino.", "Decorar con hojas de albahaca fresca, rociar con vinagreta de hierbas y aceite de oliva. Servir."]}, {"nombre": "Ensalada Portofino", "restaurante": "Crepes & Waffles", "ingredientes": ["Queso feta", "Tomate seco", "Lechuga", "Rúgula", "Albahaca", "Aceitunas negras", "Tomate fresco", "Tomate cherry", "Champiñones", "Cebolla", "Pesto", "Vinagreta de hierbas", "Aceite de oliva", "Sal", "Pimienta"], "preparacion": ["Hidratar tomate seco en agua caliente por 10 minutos, escurrir y cortar en tiras. Cortar tomate fresco en rodajas y tomate cherry por la mitad.", "Cortar queso feta en cubos. Laminar champiñones frescos y cortar cebolla en aros finos.", "Preparar vinagreta de hierbas: mezclar aceite de oliva, vinagre, hierbas frescas, sal y pimienta.", "Lavar lechuga y rúgula. Ensamblar: mezclar lechugas y albahaca como base, añadir feta, tomate seco, tomate fresco, tomate cherry, champiñones, cebolla y aceitunas.", "Agregar pesto en puntos, rociar con vinagreta de hierbas y aceite de oliva. Servir."]}, {"nombre": "Ensalada de la Casa", "restaurante": "Montolivo", "ingredientes": ["Lechuga", "Tomate cherry", "Cebolla", "Q const RESTAURANT_TAGS = { "Qbano": "q", "Crepes & Waffles": "cw", "Chef Burger": "cb", "Montolivo": "mo" };

let activeCategory = null;
let activeRestaurant = null;
let searchQuery = "";
let selectedIngredients = new Set();

// Build ingredient index: ingredient name → count of recipes
let ingredientIndex = {};    // normalized name → count
let ingredientToRecipes = {}; // normalized name → Set of recipe indices
let allRecipesFlat = [];

function buildIngredientIndex() {
  allRecipesFlat = [];
  ingredientIndex = {};
  ingredientToRecipes = {};

  for (const [cat, recipes] of Object.entries(DATA)) {
    for (const r of recipes) {
      const idx = allRecipesFlat.length;
      allRecipesFlat.push({ ...r, _cat: cat, _idx: idx });
      for (const ing of r.ingredientes) {
        const key = ing.toLowerCase();
        if (!ingredientIndex[key]) {
          ingredientIndex[key] = { display: ing, count: 0 };
          ingredientToRecipes[key] = new Set();
        }
        ingredientIndex[key].count++;
        ingredientToRecipes[key].add(idx);
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
function init() {
  buildIngredientIndex();
  renderFilters();
  renderSidebar();
  render();

  document.getElementById("search").addEventListener("input", e => {
    searchQuery = e.target.value.toLowerCase().trim();
    render();
  });

  window.addEventListener("scroll", () => {
    document.getElementById("scrollTop").classList.toggle("visible", window.scrollY > 400);
  });
}

// ═══════════════════════════════════════════════════════════════
// FILTERS (top bar)
// ═══════════════════════════════════════════════════════════════
function renderFilters() {
  const cats = Object.keys(DATA);
  const restaurants = [...new Set(Object.values(DATA).flat().map(r => r.restaurante))];

  let html = '<div class="filter-group">';
  restaurants.forEach(r => {
    html += `<button class="filter-btn tag-btn" data-tag="${r}" onclick="toggleRestaurant('${r}')">${r}</button>`;
  });
  html += '</div><div class="filter-divider"></div><div class="filter-group">';
  cats.forEach(c => {
    html += `<button class="filter-btn" data-cat="${c}" onclick="toggleCategory('${c}')">${c}</button>`;
  });
  html += '</div>';
  document.getElementById("filters").innerHTML = html;
}

function toggleCategory(cat) {
  activeCategory = activeCategory === cat ? null : cat;
  updateFilterUI();
  render();
}

function toggleRestaurant(r) {
  activeRestaurant = activeRestaurant === r ? null : r;
  updateFilterUI();
  render();
}

function updateFilterUI() {
  document.querySelectorAll("[data-cat]").forEach(b => b.classList.toggle("active", b.dataset.cat === activeCategory));
  document.querySelectorAll("[data-tag]").forEach(b => b.classList.toggle("active", b.dataset.tag === activeRestaurant));
}

// ═══════════════════════════════════════════════════════════════
// SIDEBAR - Ingredient explorer
// ═══════════════════════════════════════════════════════════════
function renderSidebar() {
  const container = document.getElementById("accordionContainer");
  let html = "";

  for (const [catName, catDef] of Object.entries(INGREDIENT_TAXONOMY)) {
    // Find which ingredients in this category actually exist in the data
    const found = [];
    for (const kw of catDef.keywords) {
      if (ingredientIndex[kw]) {
        found.push({ key: kw, display: ingredientIndex[kw].display, count: ingredientIndex[kw].count });
      }
    }
    if (found.length === 0) continue;

    // Sort by count desc, then name
    found.sort((a, b) => b.count - a.count || a.display.localeCompare(b.display));

    const totalCount = found.reduce((s, f) => s + f.count, 0);

    html += `<div class="accordion-section" data-accat="${catName}">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <div class="accordion-header-left">
          <span class="icon">${catDef.icon}</span>
          <span>${catName}</span>
          <span class="count-badge">${found.length}</span>
        </div>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="accordion-body">`;

    for (const f of found) {
      html += `<div class="ing-item" data-ing="${f.key}" onclick="toggleIngredient('${f.key.replace(/'/g, "\\'")}')">
        <span>${f.display}</span>
        <span class="ing-count">${f.count}</span>
      </div>`;
    }

    html += `</div></div>`;
  }

  container.innerHTML = html;
}

function toggleAccordion(header) {
  header.parentElement.classList.toggle("open");
}

function filterSidebarIngredients(query) {
  query = query.toLowerCase().trim();
  document.querySelectorAll(".accordion-section").forEach(section => {
    let anyVisible = false;
    section.querySelectorAll(".ing-item").forEach(item => {
      const name = item.dataset.ing;
      const visible = !query || name.includes(query);
      item.style.display = visible ? "" : "none";
      if (visible) anyVisible = true;
    });
    section.style.display = anyVisible ? "" : "none";
    if (query && anyVisible) section.classList.add("open");
  });
}

function toggleIngredient(ingKey) {
  if (selectedIngredients.has(ingKey)) {
    selectedIngredients.delete(ingKey);
  } else {
    selectedIngredients.add(ingKey);
  }
  updateIngredientUI();
  render();
}

function clearAllIngredients() {
  selectedIngredients.clear();
  updateIngredientUI();
  render();
}

function updateIngredientUI() {
  // Update sidebar items
  document.querySelectorAll(".ing-item").forEach(item => {
    item.classList.toggle("selected", selectedIngredients.has(item.dataset.ing));
  });

  // Update selected bar
  const bar = document.getElementById("selectedBar");
  if (selectedIngredients.size === 0) {
    bar.classList.remove("visible");
    bar.innerHTML = "";
    return;
  }

  bar.classList.add("visible");
  let html = '<span class="label">Filtro:</span>';
  for (const key of selectedIngredients) {
    const display = ingredientIndex[key]?.display || key;
    html += `<span class="selected-ing-pill" onclick="toggleIngredient('${key.replace(/'/g, "\\'")}')">
      ${display}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </span>`;
  }
  html += `<button class="clear-all-ing" onclick="clearAllIngredients()">Limpiar todo</button>`;
  bar.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
// MOBILE SIDEBAR
// ═══════════════════════════════════════════════════════════════
function toggleMobileSidebar() {
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("sidebarOverlay");
  const btn = document.getElementById("btnIngToggle");
  const isOpen = sidebar.classList.toggle("mobile-open");
  overlay.classList.toggle("visible", isOpen);
  btn.classList.toggle("active", isOpen);
}

// ═══════════════════════════════════════════════════════════════
// RENDER RECIPES
// ═══════════════════════════════════════════════════════════════
function matchesSearch(recipe) {
  if (!searchQuery) return true;
  const haystack = (recipe.nombre + " " + recipe.ingredientes.join(" ")).toLowerCase();
  return searchQuery.split(/\s+/).every(word => haystack.includes(word));
}

function matchesIngredientFilter(recipe) {
  if (selectedIngredients.size === 0) return true;
  const recipeIngs = new Set(recipe.ingredientes.map(i => i.toLowerCase()));
  for (const sel of selectedIngredients) {
    if (!recipeIngs.has(sel)) return false;
  }
  return true;
}

function render() {
  let html = "";
  let totalShown = 0;
  let totalAll = 0;

  for (const [cat, recipes] of Object.entries(DATA)) {
    totalAll += recipes.length;
    if (activeCategory && activeCategory !== cat) continue;

    const filtered = recipes.filter(r => {
      if (activeRestaurant && r.restaurante !== activeRestaurant) return false;
      if (!matchesSearch(r)) return false;
      if (!matchesIngredientFilter(r)) return false;
      return true;
    });

    if (filtered.length === 0) continue;
    totalShown += filtered.length;

    html += `<section class="category">
      <div class="category-header">
        <h2 class="category-name">${cat}</h2>
        <span class="category-count">${filtered.length} receta${filtered.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="recipes-grid">`;

    filtered.forEach((r, i) => {
      const tagClass = "tag-" + RESTAURANT_TAGS[r.restaurante];
      const preview = r.ingredientes.slice(0, 4).join(" \u00B7 ");

      html += `<div class="recipe-card" onclick="this.classList.toggle('expanded')">
        <span class="tag ${tagClass}">${r.restaurante}</span>
        <div class="recipe-name">${highlightSearch(r.nombre)}</div>
        <div class="ingredients-preview">${highlightSearch(preview)}${r.ingredientes.length > 4 ? '...' : ''}</div>
        <div class="ingredient-count">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          ${r.ingredientes.length} ingredientes
        </div>
        <div class="ingredients-full">
          <ul>${r.ingredientes.map(ing => {
            const isHighlighted = selectedIngredients.has(ing.toLowerCase());
            return `<li class="${isHighlighted ? 'highlighted' : ''}">${highlightSearch(ing)}</li>`;
          }).join("")}</ul>
        </div>
        ${r.preparacion && r.preparacion.length ? `<div class="preparation">
          <div class="preparation-title">Preparaci\u00F3n</div>
          <ol>${r.preparacion.map(step => `<li>${step}</li>`).join("")}</ol>
        </div>` : ''}
      </div>`;
    });

    html += `</div></section>`;
  }

  if (totalShown === 0) {
    html = `<div class="empty">
      <div class="empty-icon">:/</div>
      <h3>No se encontraron recetas</h3>
      <p>Intenta con otra b\u00FAsqueda o quita los filtros</p>
    </div>`;
  }

  document.getElementById("main").innerHTML = html;
  document.getElementById("stats").innerHTML = `<b>${totalShown}</b> de ${totalAll} recetas`;
}

function highlightSearch(text) {
  if (!searchQuery) return text;
  const words = searchQuery.split(/\s+/).filter(Boolean);
  let result = text;
  words.forEach(word => {
    const regex = new RegExp(`(${word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    result = result.replace(regex, '<mark style="background:#FEF08A;padding:0 2px;border-radius:3px">$1</mark>');
  });
  return result;
}

init();
</script>
